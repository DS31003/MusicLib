{% extends 'albumi/base.html' %} 
{% block content %}
<h1>{{ naslov_stranice }}</h1>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <table>
    {% for field in form %}
    <tr>
      <td>{{ field.label }}:</td>
      <td>{{ field }}</td>
      <td style="color: red">{{ field.errors }}</td>
    </tr>
    {% endfor %}
  </table>
  <br />
  <button type="submit" onclick="return confirm('Jesi li siguran da želiš uniejti promjene {{ album.ime }}?')">Spremi</button>
  <a href="{% url 'albumi:popis' %}">Odustani</a>
</form>

{% endblock %}
