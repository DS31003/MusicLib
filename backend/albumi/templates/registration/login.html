{% extends 'albumi/base.html' %}
{% block content %}
<h1>Prijava</h1>

{% if form.errors %}
<p style="color: red">Pogrešno korisničko ime ili lozinka.</p>
{% endif %}

<form method="post">
  {% csrf_token %}
  <p>Korisničko ime: <input type="text" name="username" /></p>
  <p>Lozinka: <input type="password" name="password" /></p>
  <button type="submit">Prijavi se</button>
</form>

<p>Nemaš račun? <a href="{% url 'registracija' %}">Registriraj se</a></p>

{% endblock %}
