{% extends 'albumi/base.html' %}
{% block content %}
<h1>Registracija</h1>

<form method="post">
  {% csrf_token %}
  <table>
    {% for field in form %}
    <tr>
      <td>{{ field.label }}:</td>
      <td>{{ field }}</td>
    </tr>
    {% if field.help_text %}
    <tr>
      <td></td>
      <td><small style="color: gray">{{ field.help_text }}</small></td>
    </tr>
    {% endif %} {% if field.errors %}
    <tr>
      <td></td>
      <td style="color: red">{{ field.errors }}</td>
    </tr>
    {% endif %} 
    {% endfor %}
  </table>
  <br />
  <button type="submit">Registriraj se</button>
</form>

{% endblock %}
